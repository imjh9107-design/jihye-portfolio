<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임지혜 - HR Data Analyst</title>
    <meta name="description" content="데이터로 HR을 분석하고 발전시키고 싶은 임지혜의 포트폴리오입니다.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>
    <!-- Canvas for dynamic background -->
    <canvas id="bg-canvas"></canvas>

    <div class="overlay"></div>

    <main>
        <section id="hero" class="glass-panel slide-up">
            <div class="hero-content">
                <span class="badge">HR Data Analyst</span>
                <h1>임지혜</h1>
                <p class="subtitle">데이터로 사람과 조직을 이해하고 발전시킵니다</p>
            </div>
        </section>

        <section id="about" class="glass-panel slide-up reveal delay-1">
            <h2><span class="icon">👤</span> About Me</h2>
            <div class="content-text">
                <p>안녕하세요. <strong>데이터로 HR을 분석하고 발전시키고 싶은 임지혜</strong>입니다.</p>
                <p>실무 경험을 바탕으로 사람과 조직을 이해하고, 데이터를 통해 더 나은 방향을 제안하는 일에 관심이 많습니다.</p>
            </div>
        </section>

        <section id="personality" class="glass-panel slide-up reveal delay-2">
            <h2><span class="icon">🧠</span> Personality</h2>
            <div class="content-text">
                <div class="badge-large">ISTP</div>
                <p>차분하고 현실적인 시각으로 문제를 바라보고, 복잡한 상황도 하나씩 정리하며 해결해가는 편입니다.</p>
            </div>
        </section>

        <section id="interests" class="glass-panel slide-up reveal delay-3">
            <h2><span class="icon">✨</span> Interests</h2>
            <div class="cards">
                <div class="card">
                    <div class="card-icon">🏋️‍♀️</div>
                    <h3>운동</h3>
                </div>
                <div class="card">
                    <div class="card-icon">📊</div>
                    <h3>데이터분석</h3>
                </div>
                <div class="card">
                    <div class="card-icon">👶</div>
                    <h3>육아</h3>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
